<!DOCTYPE html>
<html>
<head>
  <title>Nexus Forge - Staff AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #eef2f7;
    }
    h1 {
      color: #333;
    }
    input {
      width: 300px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background-color: #28a745;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      display: inline-block;
      border-radius: 6px;
      max-width: 400px;
      min-height: 50px;
    }
  </style>
</head>
<body>

  <h1>Staff AI Assistant</h1>
  <p>Smart assistant for attendance, leave, exams & rules</p>

  <input id="input" placeholder="Ask your question..." />
  <br><br>

  <button onclick="sendMessage()">Ask AI</button>

  <br><br>

  <button onclick="fillExample('What is leave policy?')">Leave</button>
  <button onclick="fillExample('Explain attendance rules')">Attendance</button>
  <button onclick="fillExample('Exam guidelines?')">Exams</button>

  <div id="output">💬 Your answer will appear here...</div>

  <script src="script.js"></script>

</body>
</html>
