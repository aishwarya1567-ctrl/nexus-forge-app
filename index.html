<!DOCTYPE html>
<html>
<head>
  <title>Nexus Forge - Staff AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    input {
      width: 300px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      display: inline-block;
      border-radius: 5px;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <h1>Staff AI Assistant</h1>
  <p>Ask about attendance, leave policies, exams & rules</p>

  <input id="input" placeholder="Enter your question..." />
  <br><br>

  <button onclick="sendMessage()">Ask AI</button>

  <br><br>

  <!-- Example quick buttons -->
  <button onclick="fillExample('What is the leave policy?')">Leave Policy</button>
  <button onclick="fillExample('Explain attendance rules')">Attendance</button>
  <button onclick="fillExample('What are exam guidelines?')">Exams</button>

  <div id="output">Your answer will appear here...</div>

  <script src="script.js"></script>

</body>
</html>
